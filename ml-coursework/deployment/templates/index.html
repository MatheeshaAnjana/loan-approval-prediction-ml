<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Approval Predictor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <header>
      <h1>Loan Approval Predictor</h1>
      <p class="subtitle">Fill in the applicant details below to get an instant prediction.</p>
    </header>

    {% if result %}
      <div class="result-card {{ 'approved' if result.approved else 'rejected' if result.approved is not none else 'error' }}">
        {% if result.approved is none %}
          <span class="icon">⚠️</span>
        {% elif result.approved %}
          <span class="icon">✅</span>
        {% else %}
          <span class="icon">❌</span>
        {% endif %}
        <span class="result-text">{{ result.message }}</span>
      </div>
    {% endif %}

    <form method="POST" action="/predict" class="loan-form">
      <div class="form-grid">

        <div class="form-group">
          <label for="Gender">Gender</label>
          <select name="Gender" id="Gender" required>
            <option value="" disabled {% if not form_data %}selected{% endif %}>Select</option>
            <option value="1" {% if form_data and form_data.Gender == '1' %}selected{% endif %}>Male</option>
            <option value="0" {% if form_data and form_data.Gender == '0' %}selected{% endif %}>Female</option>
          </select>
        </div>

        <div class="form-group">
          <label for="Married">Married</label>
          <select name="Married" id="Married" required>
            <option value="" disabled {% if not form_data %}selected{% endif %}>Select</option>
            <option value="1" {% if form_data and form_data.Married == '1' %}selected{% endif %}>Yes</option>
            <option value="0" {% if form_data and form_data.Married == '0' %}selected{% endif %}>No</option>
          </select>
        </div>

        <div class="form-group">
          <label for="Dependents">Dependents</label>
          <select name="Dependents" id="Dependents" required>
            <option value="" disabled {% if not form_data %}selected{% endif %}>Select</option>
            <option value="0" {% if form_data and form_data.Dependents == '0' %}selected{% endif %}>0</option>
            <option value="1" {% if form_data and form_data.Dependents == '1' %}selected{% endif %}>1</option>
            <option value="2" {% if form_data and form_data.Dependents == '2' %}selected{% endif %}>2</option>
            <option value="3" {% if form_data and form_data.Dependents == '3' %}selected{% endif %}>3+</option>
          </select>
        </div>

        <div class="form-group">
          <label for="Education">Education</label>
          <select name="Education" id="Education" required>
            <option value="" disabled {% if not form_data %}selected{% endif %}>Select</option>
            <option value="1" {% if form_data and form_data.Education == '1' %}selected{% endif %}>Graduate</option>
            <option value="0" {% if form_data and form_data.Education == '0' %}selected{% endif %}>Not Graduate</option>
          </select>
        </div>

        <div class="form-group">
          <label for="Self_Employed">Self Employed</label>
          <select name="Self_Employed" id="Self_Employed" required>
            <option value="" disabled {% if not form_data %}selected{% endif %}>Select</option>
            <option value="1" {% if form_data and form_data.Self_Employed == '1' %}selected{% endif %}>Yes</option>
            <option value="0" {% if form_data and form_data.Self_Employed == '0' %}selected{% endif %}>No</option>
          </select>
        </div>

        <div class="form-group">
          <label for="Property_Area">Property Area</label>
          <select name="Property_Area" id="Property_Area" required>
            <option value="" disabled {% if not form_data %}selected{% endif %}>Select</option>
            <option value="2" {% if form_data and form_data.Property_Area == '2' %}selected{% endif %}>Urban</option>
            <option value="1" {% if form_data and form_data.Property_Area == '1' %}selected{% endif %}>Semiurban</option>
            <option value="0" {% if form_data and form_data.Property_Area == '0' %}selected{% endif %}>Rural</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ApplicantIncome">Applicant Income</label>
          <input type="number" step="any" min="0" name="ApplicantIncome" id="ApplicantIncome"
                 value="{{ form_data.ApplicantIncome if form_data else '' }}" placeholder="e.g. 5000" required>
        </div>

        <div class="form-group">
          <label for="CoapplicantIncome">Coapplicant Income</label>
          <input type="number" step="any" min="0" name="CoapplicantIncome" id="CoapplicantIncome"
                 value="{{ form_data.CoapplicantIncome if form_data else '' }}" placeholder="e.g. 0" required>
        </div>

        <div class="form-group">
          <label for="LoanAmount">Loan Amount</label>
          <input type="number" step="any" min="0" name="LoanAmount" id="LoanAmount"
                 value="{{ form_data.LoanAmount if form_data else '' }}" placeholder="e.g. 128" required>
        </div>

        <div class="form-group">
          <label for="Loan_Amount_Term">Loan Amount Term (days)</label>
          <input type="number" step="any" min="0" name="Loan_Amount_Term" id="Loan_Amount_Term"
                 value="{{ form_data.Loan_Amount_Term if form_data else '' }}" placeholder="e.g. 360" required>
        </div>

        <div class="form-group">
          <label for="Credit_History">Credit History</label>
          <select name="Credit_History" id="Credit_History" required>
            <option value="" disabled {% if not form_data %}selected{% endif %}>Select</option>
            <option value="1" {% if form_data and form_data.Credit_History == '1' %}selected{% endif %}>Good</option>
            <option value="0" {% if form_data and form_data.Credit_History == '0' %}selected{% endif %}>Bad</option>
          </select>
        </div>

      </div>

      <button type="submit" class="submit-btn">Predict</button>
    </form>
  </div>
</body>
</html>
